<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4299e1"/>
      <stop offset="100%" stop-color="#667eea"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>

  <!-- QR finder pattern top-left -->
  <rect x="80"  y="80"  width="140" height="140" rx="16" fill="white"/>
  <rect x="108" y="108" width="84"  height="84"  rx="8"  fill="url(#grad)"/>
  <rect x="128" y="128" width="44"  height="44"  rx="4"  fill="white"/>

  <!-- QR finder pattern top-right -->
  <rect x="292" y="80"  width="140" height="140" rx="16" fill="white"/>
  <rect x="320" y="108" width="84"  height="84"  rx="8"  fill="url(#grad)"/>
  <rect x="340" y="128" width="44"  height="44"  rx="4"  fill="white"/>

  <!-- QR finder pattern bottom-left -->
  <rect x="80"  y="292" width="140" height="140" rx="16" fill="white"/>
  <rect x="108" y="320" width="84"  height="84"  rx="8"  fill="url(#grad)"/>
  <rect x="128" y="340" width="44"  height="44"  rx="4"  fill="white"/>

  <!-- Data modules (bottom-right quadrant) -->
  <rect x="292" y="292" width="44" height="44" rx="6" fill="white"/>
  <rect x="352" y="292" width="44" height="44" rx="6" fill="white"/>
  <rect x="412" y="292" width="20" height="44" rx="6" fill="white"/>
  <rect x="292" y="352" width="20" height="44" rx="6" fill="white"/>
  <rect x="328" y="352" width="44" height="44" rx="6" fill="white"/>
  <rect x="388" y="352" width="44" height="44" rx="6" fill="white"/>
  <rect x="292" y="412" width="44" height="20" rx="6" fill="white"/>
  <rect x="352" y="412" width="20" height="20" rx="6" fill="white"/>
  <rect x="388" y="412" width="44" height="20" rx="6" fill="white"/>
</svg>
